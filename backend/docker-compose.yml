x-backend-env: &backend-env
  MONGODB_URL: ${MONGODB_URL:-mongodb://mongodb:27017}
  MONGODB_DB_NAME: ${MONGODB_DB_NAME:-gridguard}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production-12345}
  ALGORITHM: ${ALGORITHM:-HS256}
  ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-30}
  INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
  INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8000}
  ADMIN_EMAILS: ${ADMIN_EMAILS:-vedaantsinngh@gmail.com}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
  PAYOUT_PROVIDER: ${PAYOUT_PROVIDER:-mock}
  RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
  RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
  RAZORPAYX_ACCOUNT_NUMBER: ${RAZORPAYX_ACCOUNT_NUMBER:-}
  RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
  RAZORPAY_FALLBACK_TO_MOCK: ${RAZORPAY_FALLBACK_TO_MOCK:-true}
  ENVIRONMENT: ${ENVIRONMENT:-docker}
  STALE_EVENT_MINUTES: ${STALE_EVENT_MINUTES:-90}
  MODEL_PATH: ${MODEL_PATH:-models/risk_model.pkl}
  SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  EMAIL_FROM: ${EMAIL_FROM:-GridGuard AI <noreply@gridguard.ai>}
  FIREBASE_SERVER_KEY: ${FIREBASE_SERVER_KEY:-}
  FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
  WAQI_API_TOKEN: ${WAQI_API_TOKEN:-}
  ORS_API_KEY: ${ORS_API_KEY:-}
  OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
  TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
  GRID_DATA_MODE: ${GRID_DATA_MODE:-real}
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment: *backend-env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment: *backend-env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_APP_ENV: ${NEXT_PUBLIC_APP_ENV:-docker}
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
